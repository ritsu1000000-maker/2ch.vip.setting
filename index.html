<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>複数サイトの埋め込み一覧</title>
    <style>
        /* 全体のデザイン */
        body {
            font-family: sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
            margin: 0;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        /* 埋め込み枠を並べる設定 */
        .iframe-container {
            display: flex;
            flex-direction: column; /* 上下に並べる */
            gap: 25px; /* サイト間の隙間 */
            max-width: 800px;
            margin: 0 auto;
        }

        /* 各サイトの白い枠 */
        .site-box {
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .site-box h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 16px;
            color: #555;
            border-bottom: 2px solid #3182ce;
            padding-bottom: 5px;
            display: inline-block;
        }

        /* iframe（小窓）の設定 */
        iframe {
            width: 100%;
            height: 450px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h2>指定されたサイト一覧</h2>

    <div class="iframe-container">
        
        <div class="site-box">
            <h3>🏠 2ch.viphome</h3>
            <iframe src="https://ritsu1000000-maker.github.io/2ch.viphome/"></iframe>
        </div>

        <div class="site-box">
            <h3>💬 2ch.vipLINE</h3>
            <iframe src="https://ritsu1000000-maker.github.io/2ch.vipLINE/"></iframe>
        </div>

        <div class="site-box">
            <h3>🎬 2ch.vipvideo</h3>
            <iframe src="https://ritsu1000000-maker.github.io/2ch.vipvideo/"></iframe>
        </div>

        <div class="site-box">
            <h3>🌐 2ch.vip</h3>
            <iframe src="https://ritsu1000000-maker.github.io/2ch.vip/"></iframe>
        </div>

    </div>

</body>
</html>
