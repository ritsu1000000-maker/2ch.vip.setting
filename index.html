        /* 全体のデザイン */
        body {

            padding: 20px;
            margin: 0;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        /* 埋め込み枠を並べる設定 */
        .iframe-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* 各サイトの白い枠 */
        .site-box {
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* タイトルとカウンターを横に並べる */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 2px solid #3182ce;
            padding-bottom: 5px;
        }

        .site-header h3 {
            margin: 0;
            font-size: 16px;
            color: #555;
        }

        .counter-area {
            transform: scale(0.8); /* カウンターの画像が大きすぎないように少し縮小 */
            transform-origin: right center;
        }

        /* iframe（小窓）の設定 */
        iframe {
            width: 100%;
            height: 450px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
    </style>
</head>
